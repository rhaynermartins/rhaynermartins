<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12002A"/>
      <stop offset="48%" stop-color="#17133A"/>
      <stop offset="100%" stop-color="#4A001E"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.34"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="250" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.55 0 0 0 0.48
                0 0.35 0 0 0.22
                0 0 1 0 0.95
                0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <clipPath id="rounded">
      <rect width="1200" height="360" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1200" height="360" fill="url(#bg)"/>

    <circle cx="600" cy="175" r="210" fill="url(#centerGlow)">
      <animate attributeName="r" values="190;220;190" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;1;0.75" dur="5s" repeatCount="indefinite"/>
    </circle>

    <g opacity="0.7">
      <circle cx="120" cy="90" r="2.4" fill="#FFFFFF">
        <animate attributeName="cy" values="90;80;90" dur="5.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="205" cy="255" r="2" fill="#FFFFFF">
        <animate attributeName="cy" values="255;245;255" dur="6.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="315" cy="70" r="1.8" fill="#FFFFFF">
        <animate attributeName="cy" values="70;62;70" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="445" cy="285" r="2.3" fill="#FFFFFF">
        <animate attributeName="cy" values="285;273;285" dur="5.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="720" cy="65" r="2.6" fill="#FFFFFF">
        <animate attributeName="cy" values="65;55;65" dur="5.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="895" cy="260" r="2" fill="#FFFFFF">
        <animate attributeName="cy" values="260;250;260" dur="6.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1040" cy="88" r="2.8" fill="#FFFFFF">
        <animate attributeName="cy" values="88;76;88" dur="5.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1105" cy="215" r="1.9" fill="#FFFFFF">
        <animate attributeName="cy" values="215;205;215" dur="4.9s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g filter="url(#softShadow)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>

      <text x="600" y="158"
        text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="72"
        font-weight="800"
        letter-spacing="1.5"
        fill="url(#textGrad)"
        filter="url(#textGlow)">
        Rhayner Araújo
        <animate attributeName="y" values="170;158" dur="1.2s" fill="freeze"/>
      </text>

      <text x="600" y="215"
        text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="25"
        font-weight="500"
        letter-spacing="4"
        fill="#DDD6FE"
        opacity="0.92">
        CIÊNCIA DA COMPUTAÇÃO • DESENVOLVIMENTO WEB
        <animate attributeName="opacity" values="0;0.92" dur="1.8s" fill="freeze"/>
      </text>
    </g>

    <rect x="-220" y="-40" width="150" height="460" fill="#FFFFFF" opacity="0.075" transform="skewX(-22)">
      <animate attributeName="x" values="-220;1350" dur="4.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
