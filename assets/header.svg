<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Gradiente de Fundo Base -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020212" />
      <stop offset="50%" stop-color="#070624" />
      <stop offset="100%" stop-color="#2d0520" />
    </linearGradient>

    <!-- Gradiente para o Brilho Central -->
    <radialGradient id="nebula" cx="60%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#602cdb" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#b8147d" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Filtro de Glow (Brilho Neon) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Estilos CSS para as Animações -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');
      
      .text-main {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 700;
        fill: #ffffff;
      }
      
      .text-sub {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 400;
        fill: #cccccc;
        letter-spacing: 3px;
        font-size: 16.5px;
        opacity: 0.8;
      }

      /* Animação de pulsar do neon */
      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.4)) drop-shadow(0 0 8px rgba(147, 51, 234, 0.5)); }
        50% { filter: drop-shadow(0 0 4px rgba(255,255,255,0.6)) drop-shadow(0 0 16px rgba(219, 39, 119, 0.8)); }
      }

      .animated-glow {
        animation: pulseGlow 4s infinite ease-in-out;
      }

      /* Animação das estrelas no fundo */
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      .star {
        fill: #ffffff;
        animation: twinkle 3s infinite ease-in-out;
      }
      .star-delayed {
        animation-delay: 1.5s;
      }
      .star-fast {
        animation-duration: 2s;
        animation-delay: 0.5s;
      }
    </style>
  </defs>

  <!-- Camada de Fundo -->
  <rect width="1000" height="300" fill="url(#bgGrad)" />
  <rect width="1000" height="300" fill="url(#nebula)" />

  <!-- Estrelas de Fundo Animadas -->
  <g id="stars">
    <circle cx="80" cy="70" r="1" class="star" />
    <circle cx="250" cy="50" r="1.5" class="star star-delayed" />
    <circle cx="520" cy="40" r="1" class="star" />
    <circle cx="150" cy="220" r="1.2" class="star star-fast" />
    <circle cx="400" cy="260" r="1" class="star star-delayed" />
    <circle cx="720" cy="60" r="1.5" class="star" />
    <circle cx="880" cy="90" r="1" class="star star-fast" />
    <circle cx="930" cy="210" r="1.2" class="star star-delayed" />
    <circle cx="650" cy="240" r="1" class="star" />
  </g>

  <!-- Linha de Luz Diagonal Traseira -->
  <path d="M 450 -50 L 330 350" stroke="url(#bgGrad)" stroke-width="3" opacity="0.4" filter="url(#glow)" />
  <path d="M 420 -50 L 360 350" stroke="#9333ea" stroke-width="1" opacity="0.6" filter="url(#glow)" />

  <!-- COMPENSAÇÃO VISUAL: Movido o grupo de (145, 85) para (195, 85) para empurrar tudo para a direita -->
  <g transform="translate(195, 85)">
    
    <!-- Logotipo Vetorial "RH" -->
    <g class="animated-glow" fill="#ffffff">
      <!-- Perna esquerda do H / base do R -->
      <path d="M 12 40 L 12 100 L 28 100 L 28 55 L 12 40 Z" />
      <path d="M 12 55 L 12 100 L 28 100 L 28 55 Z" opacity="0.1"/>
      
      <!-- Arco superior do R -->
      <path d="M 6 12 C 30 12, 70 15, 70 48 C 70 70, 50 82, 32 82 L 12 82 L 24 68 L 34 68 C 46 68, 54 62, 54 48 C 54 34, 40 28, 20 28 L 6 28 Z" />
      
      <!-- Perna diagonal do R -->
      <path d="M 32 72 L 56 108 L 76 108 L 48 68 Z" />
      
      <!-- Lado direito do H -->
      <path d="M 52 64 L 84 64 L 84 44 L 98 28 L 98 108 L 84 108 L 84 78 L 52 78 Z" />
    </g>

    <!-- Linha Divisória Vertical -->
    <line x1="130" y1="18" x2="130" y2="114" stroke="#ffffff" stroke-width="1" opacity="0.2" />

    <!-- Bloco de Textos -->
    <g class="animated-glow">
      <!-- Nome Principal -->
      <text x="165" y="70" font-size="50" class="text-main">Rhayner Martins</text>
    </g>
    
    <!-- Subtítulo -->
    <text x="167" y="106" class="text-sub">Software Engineer <tspan fill="#d946ef" font-weight="bold">•</tspan> Fullstack Developer</text>
  </g>
  
</svg>
